<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SketchAgent - Chat & Edit</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            height: 100vh;
            display: flex;
        }

        .sidebar {
            width: 300px;
            background-color: white;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            background-color: #3498db;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            margin-bottom: 10px;
        }

        .concept-input {
            display: flex;
            gap: 10px;
            padding: 20px;
            background-color: #f9f9f9;
            border-bottom: 1px solid #ddd;
        }

        .concept-input input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }

        .concept-input button {
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .concept-input button:hover {
            background-color: #2980b9;
        }

        .sketch-display {
            flex: 1;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: white;
            margin: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .sketch-display img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 10px;
            border: 2px solid #3498db;
        }

        .chat-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            background-color: #ecf0f1;
            padding: 15px;
            border-bottom: 1px solid #ddd;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background-color: #3498db;
            color: white;
        }

        .message.assistant {
            align-self: flex-start;
            background-color: #e8e8e8;
            color: #333;
        }

        .message.system {
            align-self: center;
            background-color: #f39c12;
            color: white;
            font-style: italic;
        }

        .chat-input {
            padding: 20px;
            background-color: white;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
        }

        .chat-input input:focus {
            border-color: #3498db;
        }

        .chat-input button {
            padding: 12px 24px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
        }

        .chat-input button:hover {
            background-color: #2980b9;
        }

        .chat-input button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #7f8c8d;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .placeholder {
            color: #7f8c8d;
            text-align: center;
            font-style: italic;
        }

        .error-message {
            background-color: #e74c3c;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }

        .stroke-animation {
            width: 100%;
            height: auto;
            border: 2px solid #3498db;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="header">
            <h1>SketchAgent</h1>
            <p>Chat-based Sketch Generation & Editing</p>
        </div>
        
        <div class="concept-input">
            <input type="text" id="conceptInput" placeholder="Enter concept to draw (e.g., 'cat', 'house', 'tree')" value="cat">
            <button onclick="generateSketch()">Generate Sketch</button>
        </div>
        
        <div class="sketch-display">
            <div id="sketchContainer" class="placeholder">
                Enter a concept and click "Generate Sketch" to begin!
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div class="chat-container">
            <div class="chat-header">
                <h3>Chat with SketchAgent</h3>
                <p>Ask to edit your sketch!</p>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                <div class="message system">
                    Welcome! Generate a sketch first, then you can ask me to edit it. 
                    Try: "Add a sun to the sketch" or "Make the cat smile"
                </div>
            </div>
            
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="Ask me to edit the sketch..." disabled>
                <button onclick="sendMessage()" id="sendButton" disabled>Send</button>
            </div>
        </div>
    </div>

    <script>
        let currentConcept = '';
        let currentImagePath = '';
        let isProcessing = false;

        function addMessage(text, sender = 'user') {
            const messagesContainer = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            messageDiv.textContent = text;
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function showLoading(message = 'Processing...') {
            const messagesContainer = document.getElementById('chatMessages');
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant loading';
            loadingDiv.innerHTML = `<div class="spinner"></div>${message}`;
            loadingDiv.id = 'loadingMessage';
            messagesContainer.appendChild(loadingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function hideLoading() {
            const loadingMessage = document.getElementById('loadingMessage');
            if (loadingMessage) {
                loadingMessage.remove();
            }
        }

        function showError(message) {
            const sketchContainer = document.getElementById('sketchContainer');
            sketchContainer.innerHTML = `<div class="error-message">${message}</div>`;
        }

        function enableChat() {
            document.getElementById('chatInput').disabled = false;
            document.getElementById('sendButton').disabled = false;
        }

        function disableChat() {
            document.getElementById('chatInput').disabled = true;
            document.getElementById('sendButton').disabled = true;
        }

        async function generateSketch() {
            if (isProcessing) return;
            
            const concept = document.getElementById('conceptInput').value.trim();
            if (!concept) {
                alert('Please enter a concept first');
                return;
            }

            isProcessing = true;
            currentConcept = concept;
            
            const sketchContainer = document.getElementById('sketchContainer');
            sketchContainer.innerHTML = '<div class="loading"><div class="spinner"></div>Generating sketch...</div>';
            
            disableChat();

            try {
                const response = await fetch('/generate-sketch', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ concept: concept })
                });

                const data = await response.json();

                if (response.ok) {
                    currentImagePath = data.image_path;
                    
                    // Display the generated sketch
                    sketchContainer.innerHTML = `
                        <div>
                            <img src="${data.image_path}?${new Date().getTime()}" alt="Generated sketch of ${concept}" />
                            <div style="text-align: center; margin-top: 10px;">
                                <strong>${concept}</strong>
                            </div>
                        </div>
                    `;
                    
                    // Show stroke animation if available
                    if (data.stroke_data) {
                        console.log('Stroke data received:', data.stroke_data);
                        // You can add SVG animation here if needed
                    }
                    
                    addMessage(`Great! I've generated a sketch of "${concept}". How would you like me to edit it?`, 'assistant');
                    enableChat();
                } else {
                    showError(data.error || 'Failed to generate sketch');
                    addMessage('Sorry, I encountered an error generating the sketch. Please try again.', 'assistant');
                }
            } catch (error) {
                console.error('Error:', error);
                showError('Network error. Please check your connection and try again.');
                addMessage('Sorry, there was a network error. Please try again.', 'assistant');
            } finally {
                isProcessing = false;
            }
        }

        async function sendMessage() {
            if (isProcessing) return;
            
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message) return;
            if (!currentConcept) {
                alert('Please generate a sketch first');
                return;
            }

            isProcessing = true;
            
            // Add user message
            addMessage(message, 'user');
            input.value = '';
            
            // Show loading
            showLoading('Editing sketch...');
            disableChat();

            try {
                // Parse the message to extract objects to add
                const objectsToAdd = extractObjectsFromMessage(message);
                
                const response = await fetch('/edit-sketch', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        concept: currentConcept,
                        objects_to_add: objectsToAdd
                    })
                });

                const data = await response.json();
                hideLoading();

                if (response.ok) {
                    // Update the sketch display
                    const sketchContainer = document.getElementById('sketchContainer');
                    sketchContainer.innerHTML = `
                        <div>
                            <img src="${data.image_path}?${new Date().getTime()}" alt="Edited sketch" />
                            <div style="text-align: center; margin-top: 10px;">
                                <strong>${currentConcept} with ${objectsToAdd.join(', ')}</strong>
                            </div>
                        </div>
                    `;
                    
                    addMessage(`Perfect! I've added ${objectsToAdd.join(' and ')} to your sketch. What else would you like me to add or change?`, 'assistant');
                } else {
                    addMessage(`Sorry, I couldn't edit the sketch: ${data.error}`, 'assistant');
                }
            } catch (error) {
                console.error('Error:', error);
                hideLoading();
                addMessage('Sorry, there was an error editing the sketch. Please try again.', 'assistant');
            } finally {
                isProcessing = false;
                enableChat();
            }
        }

        function extractObjectsFromMessage(message) {
            // Simple extraction logic - in a real app this would be more sophisticated
            const addKeywords = ['add', 'include', 'put', 'draw', 'make', 'create'];
            const message_lower = message.toLowerCase();
            
            // Look for patterns like "add a sun", "draw a tree", etc.
            const objects = [];
            
            // Common objects that might be mentioned
            const commonObjects = [
                'sun', 'moon', 'star', 'stars', 'cloud', 'clouds', 'tree', 'trees', 'flower', 'flowers',
                'bird', 'birds', 'fish', 'dog', 'cat', 'house', 'car', 'boat', 'plane', 'mountain',
                'river', 'lake', 'grass', 'sky', 'ground', 'person', 'people', 'hat', 'smile',
                'eyes', 'nose', 'mouth', 'tail', 'ears', 'legs', 'arms', 'door', 'window', 'roof'
            ];
            
            for (const obj of commonObjects) {
                if (message_lower.includes(obj)) {
                    if (!objects.includes(obj)) {
                        objects.push(obj);
                    }
                }
            }
            
            // If no specific objects found, try to extract nouns after "add"
            if (objects.length === 0) {
                const words = message.split(' ');
                for (let i = 0; i < words.length - 1; i++) {
                    if (addKeywords.includes(words[i].toLowerCase())) {
                        const nextWord = words[i + 1].replace(/[^a-zA-Z]/g, '').toLowerCase();
                        if (nextWord && nextWord.length > 2) {
                            objects.push(nextWord);
                        }
                    }
                }
            }
            
            return objects.length > 0 ? objects : ['decoration'];
        }

        // Handle Enter key in chat input
        document.getElementById('chatInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Handle Enter key in concept input
        document.getElementById('conceptInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                generateSketch();
            }
        });
    </script>
</body>
</html>
