<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced Sketch Generation - SketchAgent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #5a67d8;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            color: #4a5568;
            font-size: 1.1rem;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .section-title {
            color: #2d3748;
            font-size: 1.4rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            color: #4a5568;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-control {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            background: white;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: #5a67d8;
            box-shadow: 0 0 0 3px rgba(90, 103, 216, 0.1);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .option-card {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .option-card:hover {
            border-color: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(90, 103, 216, 0.1);
        }

        .option-card.selected {
            border-color: #5a67d8;
            background: #f7fafc;
        }

        .option-title {
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 8px;
        }

        .option-description {
            font-size: 0.9rem;
            color: #718096;
            line-height: 1.4;
        }

        .palette-colors {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-bottom: 10px;
        }

        .color-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 1px solid rgba(0,0,0,0.1);
        }

        .range-group {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 15px;
            align-items: center;
        }

        .range-input {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: #e2e8f0;
            outline: none;
        }

        .range-input::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #5a67d8;
            cursor: pointer;
        }

        .range-value {
            font-weight: 600;
            color: #5a67d8;
            text-align: center;
            padding: 8px;
            border: 2px solid #5a67d8;
            border-radius: 8px;
            background: #f7fafc;
        }

        .generate-button {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 18px 30px;
            border: none;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .generate-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.2);
        }

        .generate-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .progress-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            text-align: center;
            display: none;
        }

        .progress-section.active {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 24px;
            background: #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
            margin: 25px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 12px;
            transition: width 0.5s ease;
            width: 0%;
        }

        .progress-text {
            color: #4a5568;
            font-size: 1.1rem;
            margin-top: 15px;
        }

        .results-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            display: none;
        }

        .results-section.active {
            display: block;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 25px;
        }

        .result-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .result-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .result-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #f8f9fa;
        }

        .result-info {
            padding: 15px;
        }

        .result-title {
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 5px;
        }

        .result-meta {
            color: #718096;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .result-actions {
            display: flex;
            gap: 8px;
        }

        .result-button {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s ease;
        }

        .download-btn {
            background: #48bb78;
            color: white;
        }

        .download-btn:hover {
            background: #38a169;
        }

        .view-btn {
            background: #5a67d8;
            color: white;
        }

        .view-btn:hover {
            background: #4c51bf;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 500;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }

        @media (max-width: 768px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
            
            .range-group {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-button">
            ← Back to Studio
        </a>

        <div class="header">
            <h1>🎨 Enhanced Sketch Generation</h1>
            <p>Create beautiful AI-generated sketches with custom colors and styles</p>
        </div>

        <form id="generateForm">
            <div class="form-card">
                <h2 class="section-title">🎯 What to Draw</h2>
                <div class="form-group">
                    <label class="form-label">Concept</label>
                    <input type="text" id="conceptInput" class="form-control" 
                           placeholder="Enter what you want to draw (e.g., cat, house, flower, sunset...)" required>
                </div>
            </div>

            <div class="form-card">
                <h2 class="section-title">🎨 Style & Colors</h2>
                
                <div class="checkbox-group">
                    <input type="checkbox" id="enableColors" checked>
                    <label for="enableColors" class="form-label">Enable colored sketches</label>
                </div>

                <div class="form-group">
                    <label class="form-label">Color Palette</label>
                    <div id="paletteGrid" class="options-grid">
                        <!-- Palettes will be loaded here -->
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Drawing Style</label>
                    <div id="styleGrid" class="options-grid">
                        <!-- Styles will be loaded here -->
                    </div>
                </div>
            </div>

            <div class="form-card">
                <h2 class="section-title">⚙️ Generation Options</h2>
                
                <div class="form-group">
                    <label class="form-label">Number of Variations</label>
                    <div class="range-group">
                        <input type="range" id="variationsRange" class="range-input" 
                               min="1" max="5" value="1">
                        <div id="variationsValue" class="range-value">1</div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Generation Mode</label>
                    <select id="seedModeSelect" class="form-control">
                        <option value="stochastic">Creative (different each time)</option>
                        <option value="deterministic">Consistent (same each time)</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="generate-button" id="generateBtn">
                ✨ Generate Enhanced Sketch
            </button>
        </form>

        <div id="progressSection" class="progress-section">
            <h2>🚀 Creating your masterpiece...</h2>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">Initializing generation...</div>
        </div>

        <div id="resultsSection" class="results-section">
            <h2>🎉 Your sketches are ready!</h2>
            <div id="resultsGrid" class="results-grid">
                <!-- Results will be loaded here -->
            </div>
            <div style="text-align: center; margin-top: 30px;">
                <button class="generate-button" onclick="location.reload()">Generate Another</button>
            </div>
        </div>
    </div>

    <script>
        class EnhancedGenerator {
            constructor() {
                this.selectedPalette = 'vibrant';
                this.selectedStyle = 'sketch';
                this.currentTask = null;
                this.init();
            }

            async init() {
                await this.loadPalettes();
                await this.loadStyles();
                this.bindEvents();
            }

            async loadPalettes() {
                try {
                    const response = await fetch('/api/palettes');
                    const palettes = await response.json();
                    
                    const paletteGrid = document.getElementById('paletteGrid');
                    paletteGrid.innerHTML = '';
                    
                    Object.entries(palettes).forEach(([key, palette]) => {
                        const div = document.createElement('div');
                        div.className = `option-card ${key === this.selectedPalette ? 'selected' : ''}`;
                        div.onclick = () => this.selectPalette(key);
                        
                        const colors = Object.values(palette).filter(v => typeof v === 'string' && v.startsWith('#'));
                        const colorDots = colors.slice(0, 4).map(color => 
                            `<div class="color-dot" style="background-color: ${color}"></div>`
                        ).join('');
                        
                        div.innerHTML = `
                            <div class="palette-colors">${colorDots}</div>
                            <div class="option-title">${palette.name || key}</div>
                            <div class="option-description">${colors.length} colors</div>
                        `;
                        
                        paletteGrid.appendChild(div);
                    });
                } catch (error) {
                    console.error('Error loading palettes:', error);
                }
            }

            async loadStyles() {
                try {
                    const response = await fetch('/api/styles');
                    const styles = await response.json();
                    
                    const styleGrid = document.getElementById('styleGrid');
                    styleGrid.innerHTML = '';
                    
                    Object.entries(styles).forEach(([key, style]) => {
                        const div = document.createElement('div');
                        div.className = `option-card ${key === this.selectedStyle ? 'selected' : ''}`;
                        div.onclick = () => this.selectStyle(key);
                        
                        div.innerHTML = `
                            <div class="option-title">${style.name}</div>
                            <div class="option-description">${style.description}</div>
                        `;
                        
                        styleGrid.appendChild(div);
                    });
                } catch (error) {
                    console.error('Error loading styles:', error);
                }
            }

            selectPalette(key) {
                this.selectedPalette = key;
                document.querySelectorAll('#paletteGrid .option-card').forEach(el => el.classList.remove('selected'));
                event.target.closest('.option-card').classList.add('selected');
            }

            selectStyle(key) {
                this.selectedStyle = key;
                document.querySelectorAll('#styleGrid .option-card').forEach(el => el.classList.remove('selected'));
                event.target.closest('.option-card').classList.add('selected');
            }

            bindEvents() {
                document.getElementById('generateForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.generateSketch();
                });

                document.getElementById('variationsRange').addEventListener('input', (e) => {
                    document.getElementById('variationsValue').textContent = e.target.value;
                });
            }

            async generateSketch() {
                const concept = document.getElementById('conceptInput').value.trim();
                if (!concept) {
                    alert('Please enter a concept to draw');
                    return;
                }

                const data = {
                    concept_to_draw: concept,
                    color_palette: this.selectedPalette,
                    drawing_style: this.selectedStyle,
                    enable_colors: document.getElementById('enableColors').checked,
                    num_variations: parseInt(document.getElementById('variationsRange').value),
                    seed_mode: document.getElementById('seedModeSelect').value
                };

                try {
                    document.getElementById('generateForm').style.display = 'none';
                    document.getElementById('progressSection').classList.add('active');
                    
                    const response = await fetch('/api/generate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    
                    const result = await response.json();
                    if (result.task_id) {
                        this.currentTask = result.task_id;
                        this.pollTaskStatus();
                    } else {
                        throw new Error(result.error || 'Failed to start generation');
                    }
                } catch (error) {
                    console.error('Error generating sketch:', error);
                    alert('Error generating sketch: ' + error.message);
                    this.resetForm();
                }
            }

            async pollTaskStatus() {
                if (!this.currentTask) return;

                try {
                    const response = await fetch(`/api/task/${this.currentTask}`);
                    const task = await response.json();
                    
                    document.getElementById('progressFill').style.width = task.progress + '%';
                    
                    if (task.status === 'completed') {
                        document.getElementById('progressText').textContent = 'Complete! 🎉';
                        setTimeout(() => {
                            this.showResults(task);
                        }, 1000);
                        return;
                    } else if (task.status === 'error') {
                        throw new Error(task.error || 'Generation failed');
                    } else {
                        document.getElementById('progressText').textContent = `Status: ${task.status}... ${task.progress}%`;
                        setTimeout(() => this.pollTaskStatus(), 2000);
                    }
                } catch (error) {
                    console.error('Error polling task:', error);
                    alert('Error during generation: ' + error.message);
                    this.resetForm();
                }
            }

            showResults(task) {
                document.getElementById('progressSection').classList.remove('active');
                document.getElementById('resultsSection').classList.add('active');
                
                if (task.results && task.results.length > 0) {
                    const resultsGrid = document.getElementById('resultsGrid');
                    resultsGrid.innerHTML = '';
                    
                    task.results.forEach((result, index) => {
                        const div = document.createElement('div');
                        div.className = 'result-card';
                        
                        div.innerHTML = `
                            <img src="${result.png_path}" alt="Generated sketch ${index + 1}" class="result-image">
                            <div class="result-info">
                                <div class="result-title">Variation ${result.variation}</div>
                                <div class="result-meta">${task.concept} - ${task.style}</div>
                                <div class="result-actions">
                                    <a href="${result.png_path}" download class="result-button download-btn">PNG</a>
                                    <a href="${result.svg_path}" download class="result-button download-btn">SVG</a>
                                </div>
                            </div>
                        `;
                        
                        resultsGrid.appendChild(div);
                    });
                }
            }

            resetForm() {
                document.getElementById('generateForm').style.display = 'block';
                document.getElementById('progressSection').classList.remove('active');
                document.getElementById('resultsSection').classList.remove('active');
                document.getElementById('progressFill').style.width = '0%';
                this.currentTask = null;
            }
        }

        // Initialize generator
        let generator;
        window.addEventListener('DOMContentLoaded', () => {
            generator = new EnhancedGenerator();
        });
    </script>
</body>
</html>
